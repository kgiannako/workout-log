services:
  workout-log:
    build: .
    image: workout-log:dev
    entrypoint: []
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      STORAGE_BACKEND: local
      LOCAL_DATA_DIR: /var/task/.data
      API_KEY: dev
    ports:
      - "8000:8000"
    volumes:
      - ./app:/var/task/app
      - ./.data:/var/task/.data
